# 公开线 CI/CD:跑测试 +(打 tag 时)构建镜像推 GHCR,供社区直接 docker pull。
# 跑在 GitHub 托管 runner,凭自动注入的 GITHUB_TOKEN,不含任何自有密钥、不触碰生产。
name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write          # 推 GHCR(ghcr.io)所需

jobs:
  # 每次 push / PR 都跑:在容器内构建到 test 阶段并执行 pytest
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 容器内构建并跑测试
        run: docker build --target test .

  # 仅打 v* tag 时:构建 runtime 镜像推 GHCR + 主包 wheel/sdist 附到 GitHub Release
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 创建 Release / 上传 assets 所需
      packages: write          # 推 GHCR(ghcr.io)所需
    steps:
      - uses: actions/checkout@v5

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 多架构构建:QEMU 提供 arm64 模拟,buildx 提供 multi-platform 构建器
      - name: 配置 QEMU(arm64 模拟)
        uses: docker/setup-qemu-action@v4

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@v4

      # 从 git ref 自动推导镜像 tag(v 版本号 + 语义化系列 + latest)
      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 构建并推送 runtime 镜像(多架构)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64    # 双架构:arm 机器原生跑,消除 platform mismatch warning
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 构建主包 wheel + sdist,附到 GitHub Release 供直接下载
      # (complex 插件含 gitignored 业务 SQL,不公开分发,故只打主包)
      - name: 安装 uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: 构建主包 wheel + sdist
        run: uv build --package redshift-mcp
        # 产物落在 dist/redshift_mcp-<ver>-py3-none-any.whl 与 dist/redshift_mcp-<ver>.tar.gz

      - name: 创建 Release 并附上 wheel/sdist
        uses: softprops/action-gh-release@v3
        with:
          # 只传发行产物;不用 dist/* —— uv build 会在 dist/ 留一个 .gitignore,
          # 会被 softprops 改名成 default.gitignore 误传为资产。
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true     # 自动生成发布说明
          fail_on_unmatched_files: true    # 匹配不到就让步骤失败,避免发空 Release
