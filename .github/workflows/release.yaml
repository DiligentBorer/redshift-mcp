# 公开线 CI/CD:跑测试 +(打 tag 时)构建镜像推 GHCR,供社区直接 docker pull。
# 跑在 GitHub 托管 runner,凭自动注入的 GITHUB_TOKEN,不含任何自有密钥、不触碰生产。
name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write          # 推 GHCR(ghcr.io)所需

jobs:
  # 每次 push / PR 都跑:在容器内构建到 test 阶段并执行 pytest
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 容器内构建并跑测试
        run: docker build --target test .

  # 仅打 v* tag 时:构建 runtime 镜像并推 GHCR
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 从 git ref 自动推导镜像 tag(v 版本号 + 语义化系列 + latest)
      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 构建并推送 runtime 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
