# complex 插件配置范本（结构与 host config.yaml 同构）。
#
# 这是给人拷贝的模板：只在 git 仓库里，不进生产 wheel。两种用法二选一：
#   ① 拷贝为同目录 config.yaml（gitignored；dev 直接用、生产 build 时打进 wheel）；
#   ② 设环境变量 REDSHIFT_MCP_COMPLEX_CONFIG 指向真实配置文件（不重新 build 就换配置）。
# 不配置则 complex 启动时报错跳过、不注册工具（无静默兜底）。
#
# sql 与 sql_file 二选一；sql_file 相对本文件所在目录。
# sql: |                     # 也可换成 sql_file: queries/error_api.example.sql
#       SELECT DISTINCT client_ip, COUNT(DISTINCT device_id) AS device_count
#       FROM analytics.events
#       WHERE event_date = %(event_date)s
#         AND country = 'US'    
#       GROUP BY client_ip
#       ORDER BY device_count DESC
#       LIMIT %(limit)s
sql_file: queries/error_api.example.sql
