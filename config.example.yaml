# Redshift MCP Server 配置示例。
# 把本文件拷贝为 config.yaml 并填入实际值；config.yaml 已被 gitignore。

database:
  # 使用只读 Redshift 账号。
  host: your-cluster.xxxxxx.us-east-1.redshift.amazonaws.com
  port: 5439
  dbname: dev
  user: readonly_user
  password: ""
  sslmode: require        # Redshift 建议设为 require
  pool_min_size: 1
  pool_max_size: 5
  connect_timeout: 10

server:
  host: 0.0.0.0
  port: 8000
  path: /redshift         # Streamable HTTP 端点路径
  # 静态 Bearer Token。客户端必须携带: Authorization: Bearer <auth_token>
  # 生产环境替换为一串足够长的随机字符串。
  auth_token: "change-me-to-a-long-random-string"

query:
  statement_timeout_ms: 60000   # 单条 SQL 超时（毫秒）；约为实测典型值 15s 的 4 倍
  max_rows: 10000               # 结果行数截断阈值

plugins:
  # 插件以独立可安装包形式分发：在自己的 pyproject.toml 里声明
  #   [project.entry-points."redshift_mcp.plugins"]
  #   <name> = "<import_pkg>:register"
  # 装进与本 server 同一个 venv 后，启动时自动被发现并注册工具 —— 没有「插件目录」。
  enabled: true                 # false => 整体跳过插件加载
  # 已安装但想临时不启用的插件名列表（按 entry-point name 匹配）。
  # 例: disabled: ["error_api"]
  disabled: []
  # 注：插件的私有配置内聚在各插件内部，本 host 配置不承载（例如 error_api 的 SQL
  # 在其包内的 queries/error_api.example.sql）。这里只有「加载开关」，没有 plugins.config。

logging:
  level: INFO                   # DEBUG | INFO | WARNING | ERROR | CRITICAL
  # 滚动日志文件路径。注释掉本行（或设为 null / ""）则只输出到 stderr。
  # 父目录会自动创建。
  file: ./logs/redshift-mcp.log
  max_bytes: 10485760           # 10 MB
  backup_count: 5               # 保留这么多份历史文件
  as_json: false                # true => 输出 JSON 行格式（而非文本格式）

  # ---- SQL 审计通道（run_sql 的完整 SQL 文本）----
  # 与上面的 level 正交，专门控制是否把每条 run_sql 的 SQL 文本落盘。
  #   WARNING（默认）→ 不输出 SQL 文本（防 WHERE 子句里的 PII 进日志）
  #   INFO           → 输出每条 run_sql 的完整 SQL（成功 + 失败）
  #   DEBUG          → 同 INFO（预留未来加更详细诊断的余地）
  # 只改这一项不会影响 uvicorn / mcp 等其它 logger 的输出量。
  sql_audit_level: WARNING
  # SQL 审计独立文件路径。
  #   null / ""    → 合流：audit 与运行日志共用 stderr + file（受 sql_audit_level 控制是否输出）
  #   非空路径     → 独立：audit 写到这里独立的 RotatingFileHandler，
  #                  与运行日志物理分离，便于做单独的 retention / 加密 / SIEM 接入
  sql_audit_file: null
  # 示例（独立模式）：
  # sql_audit_file: ./logs/sql-audit.log

# 通用查询能力的表白名单。每一项必须 schema-qualified（schema.table）。
# 留空 list 即等于禁用 list_tables / describe_table / run_sql 三个工具
# （它们仍然注册，但所有调用都会被白名单拒绝）。
#
# 列说明（columns 下面的子项）是可选的：列名/类型/位置由 SVV_COLUMNS 动态
# 拉取，本配置里的 description / example_values 会叠加进 describe_table
# 返回的列对象，作为给 LLM 客户端的额外提示。
tables: []
# 示例:
# tables:
#   - name: analytics.events
#     description: "事件流水宽表（IP / 设备 / 国家 / 日期）"
#     columns:
#       client_ip:
#         description: "客户端 IP"
#         example_values: ["1.2.3.4"]
#       event_date:
#         description: "事件日期，YYYY-MM-DD"
#         example_values: ["2026-05-20"]
#   - name: analytics.users
#     description: "用户主数据表"
#     # 不写 columns 也可以；schema 全部由 DB 动态拉取

# ============================================================================
# 声明式 SQL 工具（第二种插件机制：零代码，直接在 config 里声明 → 启动注册成 MCP 工具）
# ============================================================================
# 每项 = 一个工具。参数 type 支持 string / int / date / enum；调用时由 FastMCP 按
# schema 校验类型，date 额外按 format 校验。SQL 用命名占位符 %(参数名)s 绑定（安全，
# 不拼字符串）。LIKE 模式里的字面 % 要写成 %%。
#
# 安全闸门：safe 默认 true —— 注册时校验 SQL 是单条只读 SELECT（拒 DML/DDL/多语句/
# SELECT INTO），不通过则跳过该工具。个别确需特殊语句的可设 safe: false 关闭（运维自负）。
# LIMIT 可写可不写：顶层缺 LIMIT 时（仅 safe=true）自动追加 LIMIT (max_rows+1) 下推到 DB；
# 显式写了 LIMIT 则原样尊重、不收紧。safe=false 不自动加，须自带。
sql_tools: []
# 示例:
# sql_tools:
#   - name: active_devices_by_day
#     description: "查询指定日期某国家的活跃设备数"
#     sql: |                     # 也可换成 sql_file: queries/active_devices.example.sql
#       SELECT country, COUNT(DISTINCT device_id) AS devices
#       FROM analytics.events
#       WHERE event_date = %(date)s AND country = %(country)s
#       GROUP BY country
#       LIMIT 100
#     params:
#       - {name: date, type: date, format: "%Y-%m-%d", description: "事件日期"}
#       - {name: country, type: enum, enum: ["US", "CA", "UK"], description: "国家码"}
#     # max_rows: 5000           # 可选，覆盖全局 query.max_rows
#     # safe: true               # 默认 true；个别特殊语句可设 false 关闭只读闸门

# ----------------------------------------------------------------------------
# 配置拆分（可选）：条目多时把 sql_tools / tables 拆到独立片段文件，主配置只留一行 include。
# include 是 glob（相对本文件目录），片段按「列表追加 / dict 深合并 / 标量片段覆盖」并入。
# 片段里的 sql_tools 条目可用 sql_file: ../queries/x.sql 把大 SQL 外链到独立 .sql。
# include:
#   - conf.d/*.yaml

